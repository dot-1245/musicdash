<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MusicDash Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono:wght@400;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --panel: rgba(255,255,255,0.05); --text: #eee; --dim: #777; --bar-h: 12px; --accent: #888; }
        body.theme-light { --bg: #f8f8f8; --text: #111; --dim: #666; --panel: rgba(0,0,0,0.06); }
        body.theme-dark { --bg: #0b0b0b; --text: #eee; --dim: #888; --panel: rgba(255,255,255,0.08); }
        body.theme-amoled { --bg: #000000; --text: #fff; --dim: #555; --panel: rgba(255,255,255,0.1); }
        
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; height: 100vh; transition: 0.5s; touch-action: manipulation; }
        
        /* タイトルとアーティストのCSS端折り（鉄壁設定） */
        .text-container { min-width: 0; flex: 1; overflow: hidden; }
        h1, .artist {
            display: block;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
        }

        .container { display: grid; grid-template-columns: 42vh 1fr 280px; height: 100vh; padding: 0 50px; align-items: center; gap: 40px; }
        #art { width: 42vh; height: 42vh; max-width: 320px; max-height: 320px; border-radius: 30px; background: #222 no-repeat center/cover; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transition: 0.5s; }
        
        h1 { font-size: 2.2rem; }
        .artist { color: var(--dim); font-size: 1.3rem; margin-top: 5px; margin-bottom: 20px; }
        
        .bar-bg { width: 100%; height: var(--bar-h); background: var(--panel); border-radius: 10px; cursor: pointer; margin-bottom: 5px; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; transition: width 0.15s linear, background-color 0.8s ease; }
        
        .ctrl-row { display: flex; align-items: center; gap: 15px; margin: 20px 0; }
        .btn { background: var(--panel); border: none; color: var(--text); border-radius: 50%; width: 55px; height: 55px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-l { width: 75px; height: 75px; color: var(--accent); transition: color 0.8s ease; }
        .toggle-active { color: var(--accent) !important; font-variation-settings: 'FILL' 1; }
        
        .right-panel { text-align: right; border-left: 1px solid var(--panel); padding-left: 30px; height: 50%; display: flex; flex-direction: column; justify-content: center; }
        #clock { font-family: 'Orbitron', sans-serif !important; font-size: 4.5rem; font-weight: 700; line-height: 1; margin-bottom: 10px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(25px); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .overlay.show { display: flex; opacity: 1; }
        .overlay-item { font-size: 1.8rem; font-weight: bold; cursor: pointer; color: #444; margin: 10px 0; transition: 0.3s; }
        .overlay-item.active { color: #fff; }
        .menu-trigger { position: fixed; top: 30px; right: 30px; z-index: 110; cursor: pointer; opacity: 0.6; }

        /* スマホ向けレスポンシブ調整 */
        @media (max-width: 900px) {
            .container { grid-template-columns: 35vh 1fr 200px; padding: 0 30px; gap: 25px; }
            #clock { font-size: 3rem; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body class="theme-dark">
    <div class="menu-trigger" onclick="toggleOverlay('menu-overlay')"><span class="material-symbols-rounded" style="font-size:32px">menu</span></div>
    
    <div id="menu-overlay" class="overlay" onclick="toggleOverlay('menu-overlay')">
        <div class="overlay-item" onclick="setTheme('light')">LIGHT</div>
        <div class="overlay-item" onclick="setTheme('dark')">DARK</div>
        <div class="overlay-item" onclick="setTheme('amoled')">AMOLED</div>
        <hr style="width:50px; border:1px solid var(--panel); margin:20px 0;">
        <div class="overlay-item" onclick="toggleFS(event)" style="display:flex; align-items:center; gap:10px;">
            <span class="material-symbols-rounded">fullscreen</span> FULLSCREEN / LOCK
        </div>
    </div>

    <div id="player-overlay" class="overlay" onclick="toggleOverlay('player-overlay')"><div id="full-p-list"></div></div>

    <div class="container">
        <div id="art"></div>
        <div class="content text-container">
            <div id="active-p-name" style="color:var(--accent); font-size:0.8rem; margin-bottom:10px; cursor:pointer; font-weight:bold" onclick="toggleOverlay('player-overlay')">AUTO</div>
            <h1 id="title">No Media</h1>
            <p id="artist" class="artist">-</p>
            
            <div class="bar-bg" id="seek-bg"><div id="seek-fill" class="bar-fill"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; opacity:0.6; margin-bottom:15px;"><span id="curr-t">0:00</span><span id="total-t">0:00</span></div>
            
            <div class="ctrl-row">
                <span class="material-symbols-rounded btn" id="shuf" onclick="control('shuffle')">shuffle</span>
                <span class="material-symbols-rounded btn" onclick="control('previous')">skip_previous</span>
                <span class="material-symbols-rounded btn btn-l" onclick="control('play-pause')"><span id="p-icon" class="material-symbols-rounded" style="font-size:45px">play_arrow</span></span>
                <span class="material-symbols-rounded btn" onclick="control('next')">skip_next</span>
                <span class="material-symbols-rounded btn" id="loop" onclick="control('loop')">repeat</span>
            </div>
            
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="btn" style="width:40px;height:40px" onclick="control('vol_down')">－</button>
                <div style="flex:1; max-width:120px; height:6px; background:var(--panel); border-radius:3px;"><div id="v-fill" style="height:100%; background:var(--accent); width:0%; border-radius:3px; transition:0.8s"></div></div>
                <button class="btn" style="width:40px;height:40px" onclick="control('vol_up')">＋</button>
                <span id="v-txt" style="font-weight:bold; font-size:0.8rem; width:40px">0%</span>
            </div>
        </div>
        
        <div class="right-panel">
            <div id="clock">00:00</div>
            <div style="display:flex; align-items:center; gap:10px; color:var(--dim); justify-content:flex-end;">
                <span id="batt-icon" class="material-symbols-rounded">battery_full</span><span id="batt-level">--%</span>
            </div>
            <div id="date" style="margin-top:15px; opacity:0.5; font-size:0.9rem;">--.--.--</div>
        </div>
    </div>

    <script>
        let duration = 0, isLock = false;

        // 画面を横向きに強制固定（ユーザー操作が必要）
        async function lockOrientation() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (e) { console.warn("Orientation Lock failed:", e); }
        }

        // 画面のどこかを触ったら回転ロックを試みる
        document.addEventListener('click', () => { lockOrientation(); }, { once: true });

        async function update() {
            if (isLock) return;
            try {
                const res = await fetch('/api/metadata');
                const d = await res.json();
                
                if (d.accent_color) document.documentElement.style.setProperty('--accent', d.accent_color);

                // モバイルVivaldi向けにJS端折り（18文字制限）
                const truncate = (s, n) => (s.length > n) ? s.substr(0, n-1) + '...' : s;
                document.getElementById('title').innerText = truncate(d.title, 18);
                document.getElementById('artist').innerText = truncate(d.artist, 22);

                document.getElementById('p-icon').innerText = d.status === "Playing" ? "pause" : "play_arrow";
                document.getElementById('active-p-name').innerText = d.active_player.toUpperCase();
                duration = d.length;
                document.getElementById('seek-fill').style.width = (d.length > 0 ? (d.position/d.length*100) : 0) + "%";
                document.getElementById('curr-t').innerText = fmt(d.position);
                document.getElementById('total-t').innerText = fmt(d.length);
                document.getElementById('v-fill').style.width = (d.volume * 100) + "%";
                document.getElementById('v-txt').innerText = Math.round(d.volume * 100) + "%";
                document.getElementById('shuf').classList.toggle('toggle-active', d.shuffle);
                document.getElementById('loop').innerText = d.loop === "Track" ? "repeat_one" : "repeat";
                document.getElementById('loop').classList.toggle('toggle-active', d.loop !== "None");
                
                if (d.art_url) document.getElementById('art').style.backgroundImage = `url("${d.art_url.replace('file://','')}")`;
                
                let h = "";
                d.players.forEach(p => h += `<div class="overlay-item ${d.active_player===p?'active':''}" onclick="selP('${encodeURIComponent(p)}')">${p.toUpperCase()}</div>`);
                document.getElementById('full-p-list').innerHTML = h;
            } catch(e) {}
        }

        function toggleFS(e) { 
            if(e) e.stopPropagation();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                lockOrientation();
            } else {
                document.exitFullscreen();
            }
            toggleOverlay('menu-overlay');
        }

        function setTheme(t) { document.body.className = 'theme-' + t; toggleOverlay('menu-overlay'); }
        function toggleOverlay(id) { const el = document.getElementById(id); if (el.style.display === 'flex') { el.classList.remove('show'); setTimeout(() => el.style.display = 'none', 300); } else { el.style.display = 'flex'; setTimeout(() => el.classList.add('show'), 10); } }
        async function selP(n) { await fetch(`/api/select_player/${n}`); toggleOverlay('player-overlay'); update(); }
        async function control(a) { isLock = true; await fetch(`/api/control/${a}`); setTimeout(() => { isLock = false; update(); }, 300); }
        function fmt(s) { return !s || s<0 ? "0:00" : Math.floor(s/60)+":"+Math.floor(s%60).toString().padStart(2,'0'); }
        function clock() { const n = new Date(); document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0'); document.getElementById('date').innerText = n.getFullYear()+"."+(n.getMonth()+1).toString().padStart(2,'0')+"."+n.getDate().toString().padStart(2,'0'); }
        async function updateBatt() { if ('getBattery' in navigator) { const b = await navigator.getBattery(); document.getElementById('batt-level').innerText = Math.round(b.level * 100) + "%"; document.getElementById('batt-icon').innerText = b.charging ? "battery_charging_full" : "battery_full"; } }
        
        document.getElementById('seek-bg').onclick = (e) => { const r = e.currentTarget.getBoundingClientRect(); control(`seek?offset=${((e.clientX - r.left) / r.width) * duration}`); };
        document.addEventListener('keydown', (e) => { if(e.key.toLowerCase()==='f') toggleFS(); });
        
        setInterval(update, 2000); setInterval(clock, 1000); setInterval(updateBatt, 10000);
        update(); clock(); updateBatt();
    </script>
</body>
</html>
